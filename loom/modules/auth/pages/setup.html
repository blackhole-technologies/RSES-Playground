<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>loom — first-boot setup</title>
</head>
<body>
<h1>Create admin account</h1>
<p>This is the first time loom has booted. Create the administrator account that will manage the rest. The bootstrap token is consumed on submit; no further visits to this page will work.</p>
<form method="post" action="/setup">
<input type="hidden" name="token" value="{{TOKEN}}">
<p><label>Username (3 to 32 chars; letters, digits, underscore, hyphen):<br>
<input type="text" name="username" required pattern="[a-zA-Z0-9_\-]{3,32}" autocomplete="username" autofocus></label></p>
<p><label>Password (8 characters or more):<br>
<input type="password" name="password" required minlength="8" autocomplete="new-password"></label></p>
<p><label>Email (optional):<br>
<input type="email" name="email" autocomplete="email"></label></p>
<p><label>Display name (optional):<br>
<input type="text" name="displayName" maxlength="64"></label></p>
<p><button type="submit">Create admin account</button></p>
</form>
</body>
</html>
