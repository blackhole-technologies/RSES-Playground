# Complete RSES config example
# Tests all section types and features

# =============================================================================
# Layer 2: Pattern-Based Sets
# =============================================================================
[sets]
tools       = tool-*
quantum     = quantum-*
web         = web-* | webapp-*
viz         = viz-* | visual-*
utils       = util-* | utility-*
docs        = doc-* | docs-*

# =============================================================================
# Layer 2: Attribute-Based Sets
# =============================================================================
[sets.attributes]
claude      = {source = claude}
chatgpt     = {source = chatgpt}
gemini      = {source = gemini}
cursor      = {source = cursor}
python      = {files ~ *.py}
javascript  = {files ~ *.js | *.ts}
tested      = {files ~ test_* | *_test.*}
archived    = {status = archived}
active      = {status = active}

# =============================================================================
# Layer 3: Compound Sets (Expressions)
# =============================================================================
[sets.compound]
claude-tools    = $tools & $claude
untested        = !$tested
active-web      = $web & !$archived
all-viz         = $viz | ($claude & $quantum)
python-tested   = $python & $tested

# =============================================================================
# Layer 4: Topic Rules
# =============================================================================
[rules.topic]
$tools              -> tools-and-utilities
$quantum            -> quantum
$web                -> web-apps
$viz                -> visualizations
$docs               -> documentation
$claude & $quantum  -> quantum/claude
$chatgpt & $quantum -> quantum/chatgpt

# =============================================================================
# Layer 4: Type Rules
# =============================================================================
[rules.type]
*-app           -> web-app
*-webapp        -> web-app
*-lib           -> library
*-library       -> library
*-framework     -> framework
*-cli           -> cli-tool
*-tool          -> cli-tool
*-game          -> game
*-viz           -> visualization
*               -> uncategorized

# =============================================================================
# Layer 4: Filetype Rules
# =============================================================================
[rules.filetype]
*.py            -> code/python
*.js            -> code/javascript
*.ts            -> code/typescript
*.jsx | *.tsx   -> code/react
*.html          -> web/html
*.css | *.scss  -> web/styles
*.md            -> documentation
*.json          -> config/json
*.yaml | *.yml  -> config/yaml
*.sh | *.zsh    -> scripts

# =============================================================================
# Security Configuration
# =============================================================================
[security]
sensitive_patterns = .env, .env.*, *.pem, *.key, credentials.*
sensitive_dirs = .ssh, .aws, .gnupg, .docker
boundary = ~/Projects
max_files_per_run = 5000
max_symlinks_per_run = 10000
audit_level = security

# =============================================================================
# Performance Configuration
# =============================================================================
[performance]
cache_patterns = true
cache_sets = true
parallel = true
max_workers = 4
