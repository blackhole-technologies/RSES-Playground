apiVersion: v1
kind: ConfigMap
metadata:
  name: rses-cms-config
  namespace: rses-cms
  labels:
    app.kubernetes.io/name: rses-cms
data:
  NODE_ENV: "production"
  PORT: "5000"
  LOG_LEVEL: "info"
  # Database pool settings
  DB_POOL_MIN: "2"
  DB_POOL_MAX: "10"
  DB_IDLE_TIMEOUT: "30000"
  DB_CONNECTION_TIMEOUT: "5000"
  DB_STATEMENT_TIMEOUT: "30000"
