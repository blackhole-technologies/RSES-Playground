<!DOCTYPE html>
<html lang="en" data-theme="auto">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <title>Sign in — {{siteName}}</title>
  <link rel="icon" href="/favicon.ico">
  <style>
    /* Inline all styles for this page so it renders instantly with no extra requests. */
    :root {
      --bg-primary: #ffffff;
      --bg-secondary: #f7f7f8;
      --bg-tertiary: #eeeff1;
      --text-primary: #0b0c0f;
      --text-secondary: #5a5e66;
      --text-tertiary: #8b9099;
      --border-subtle: #e5e6e9;
      --border-strong: #c6c8cd;
      --border-focus: #0052cc;
      --accent-primary: #0052cc;
      --accent-primary-hover: #003d99;
      --accent-primary-bg: #e7efff;
      --accent-danger: #c02828;
      --accent-danger-bg: #fbe7e7;
      --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", "Inter",
                   Roboto, "Helvetica Neue", Arial, "Noto Sans", sans-serif;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg-primary: #0d0e11;
        --bg-secondary: #15171c;
        --bg-tertiary: #1d2028;
        --text-primary: #ebedf0;
        --text-secondary: #a7abb3;
        --text-tertiary: #6b707a;
        --border-subtle: #252932;
        --border-strong: #3a3f4a;
        --border-focus: #6ba9ff;
        --accent-primary: #6ba9ff;
        --accent-primary-hover: #9bc4ff;
        --accent-primary-bg: #102643;
        --accent-danger: #f28a8a;
        --accent-danger-bg: #3a1313;
      }
    }

    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
    }

    body {
      background-color: var(--bg-secondary);
      color: var(--text-primary);
      font-family: var(--font-sans);
      font-size: 15px;
      line-height: 22px;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    main {
      min-height: 100dvh;
      display: grid;
      place-items: center;
      padding: 16px;
    }

    .card {
      background-color: var(--bg-primary);
      border: 1px solid var(--border-subtle);
      border-radius: 8px;
      width: 100%;
      max-width: 400px;
      padding: 32px;
    }

    @media (max-width: 480px) {
      .card {
        padding: 24px;
        border-radius: 0;
        border-left: none;
        border-right: none;
      }
    }

    .brand {
      font-size: 13px;
      line-height: 18px;
      color: var(--text-secondary);
      text-align: center;
      margin: 0 0 8px;
      font-weight: 500;
      letter-spacing: 0.02em;
    }

    h1 {
      font-size: 20px;
      line-height: 28px;
      font-weight: 600;
      margin: 0 0 24px;
      text-align: center;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    label {
      font-size: 13px;
      line-height: 18px;
      color: var(--text-secondary);
      font-weight: 500;
    }

    input[type="text"],
    input[type="password"] {
      background-color: var(--bg-primary);
      color: var(--text-primary);
      border: 1px solid var(--border-strong);
      border-radius: 4px;
      padding: 8px 12px;
      font-family: inherit;
      font-size: 15px;
      line-height: 22px;
      width: 100%;
      transition: none;
    }

    input[type="text"]:focus,
    input[type="password"]:focus {
      outline: none;
      border-color: var(--border-focus);
      box-shadow: 0 0 0 2px var(--accent-primary-bg);
    }

    button[type="submit"] {
      background-color: var(--accent-primary);
      color: white;
      border: none;
      border-radius: 4px;
      padding: 10px 16px;
      font-family: inherit;
      font-size: 15px;
      line-height: 22px;
      font-weight: 500;
      cursor: pointer;
      margin-top: 8px;
    }

    button[type="submit"]:hover {
      background-color: var(--accent-primary-hover);
    }

    button[type="submit"]:focus-visible {
      outline: none;
      box-shadow: 0 0 0 2px var(--accent-primary-bg),
                  0 0 0 4px var(--border-focus);
    }

    button[type="submit"]:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .error {
      background-color: var(--accent-danger-bg);
      color: var(--accent-danger);
      border-radius: 4px;
      padding: 8px 12px;
      font-size: 13px;
      line-height: 18px;
      margin: 0;
    }

    .footer {
      margin-top: 24px;
      text-align: center;
      font-size: 13px;
      line-height: 18px;
      color: var(--text-tertiary);
    }

    .footer a {
      color: var(--text-secondary);
      text-decoration: none;
      border-bottom: 1px solid var(--border-subtle);
    }

    .footer a:hover {
      color: var(--text-primary);
      border-bottom-color: var(--border-strong);
    }

    .footer a:focus-visible {
      outline: 2px solid var(--border-focus);
      outline-offset: 2px;
      border-bottom-color: transparent;
    }

    /* Respect prefers-reduced-motion */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        transition: none !important;
        animation: none !important;
      }
    }
  </style>
</head>
<body>
  <main>
    <div class="card">
      <p class="brand">{{siteName}}</p>
      <h1>Sign in</h1>

      {{#error}}
      <p class="error" role="alert" aria-live="assertive">{{error}}</p>
      {{/error}}

      <form method="post" action="/api/auth/login" autocomplete="on" novalidate>
        <input type="hidden" name="csrf_token" value="{{csrfToken}}">

        <div class="field">
          <label for="username">Username</label>
          <input
            type="text"
            id="username"
            name="username"
            autocomplete="username"
            required
            autofocus
            pattern="^[a-zA-Z0-9_-]{3,32}$"
            inputmode="text"
            spellcheck="false"
            autocapitalize="off">
        </div>

        <div class="field">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            name="password"
            autocomplete="current-password"
            required
            minlength="8">
        </div>

        <button type="submit">Sign in</button>
      </form>

      {{#registrationEnabled}}
      <p class="footer">
        New here? <a href="/register">Create an account</a>
      </p>
      {{/registrationEnabled}}

      {{#bootstrapMode}}
      <p class="footer">
        First time setup? <a href="/setup?token={{bootstrapToken}}">Create your admin account</a>
      </p>
      {{/bootstrapMode}}
    </div>
  </main>
</body>
</html>
