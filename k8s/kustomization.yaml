apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: rses-cms

resources:
  - namespace.yaml
  - configmap.yaml
  - secret.yaml
  - deployment.yaml
  - service.yaml
  # Uncomment to include ingress
  # - ingress.yaml

commonLabels:
  app.kubernetes.io/name: rses-cms
  app.kubernetes.io/version: "0.6.4"
  app.kubernetes.io/managed-by: kustomize

